<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍻 飲み会 席決めアプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    color: #fff; padding: 16px 12px 80px;
  }
  h1 {
    text-align: center; margin: 0 0 4px;
    font-size: 22px; font-weight: 900;
    background: linear-gradient(90deg, #FFD700, #FF6B6B, #FF9FF3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 20px; }
  .panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 16px; margin-bottom: 14px;
  }
  .panel-title { font-weight: 800; font-size: 13px; margin-bottom: 12px; }
  .panel-title.gold { color: #FFD700; }
  .panel-title.cyan { color: #48DBFB; }
  .panel-title.gray { color: rgba(255,255,255,0.5); }
  .row { display: flex; gap: 8px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  label { font-size: 11px; color: rgba(255,255,255,0.5); }
  input[type=number], input[type=text] {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 12px;
    color: #fff; font-size: 15px; outline: none;
    width: 100%; font-family: inherit;
  }
  input::placeholder { color: rgba(255,255,255,0.3); }
  .btn {
    width: 100%; padding: 12px 0;
    border: none; border-radius: 12px;
    color: #fff; font-weight: 800; font-size: 14px;
    cursor: pointer; font-family: inherit;
    margin-top: 10px;
  }
  .btn-gold { background: linear-gradient(135deg, #FFD700, #FF6B6B); }
  .btn-cyan { background: linear-gradient(135deg, #48DBFB, #54A0FF); }
  .btn-pink { background: linear-gradient(135deg, #FF9FF3, #FF6B6B); font-size: 16px; padding: 14px 0; }
  .btn:active { opacity: 0.8; transform: scale(0.98); }

  /* People pool */
  .pool {
    min-height: 60px; display: flex; flex-wrap: wrap; gap: 8px;
    border: 2px dashed rgba(255,255,255,0.15); border-radius: 14px;
    padding: 12px; transition: all 0.2s;
  }
  .pool.drag-over { border-color: #FFD700; background: rgba(255,215,0,0.08); }
  .pool-empty { font-size: 12px; color: rgba(255,255,255,0.25); align-self: center; }
  .chip {
    border-radius: 20px; padding: 6px 12px;
    font-size: 13px; font-weight: 700;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    cursor: grab; user-select: none; touch-action: none;
  }
  .chip-x { cursor: pointer; opacity: 0.7; font-size: 11px; }

  /* Tables */
  .tables-area { display: flex; flex-direction: column; gap: 14px; }
  .table-wrap { position: relative; }
  .table-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 16px;
    backdrop-filter: blur(8px);
  }
  .table-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .table-name { font-weight: 800; font-size: 14px; background: linear-gradient(135deg,#FFD700,#FF6B6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .table-size { font-size: 11px; color: rgba(255,255,255,0.4); font-family: monospace; }
  .table-del {
    margin-left: auto; background: #FF6B6B; border: none;
    border-radius: 50%; width: 24px; height: 24px;
    color: #fff; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .seats-grid { display: flex; flex-direction: column; gap: 6px; }
  .seats-row { display: flex; gap: 6px; justify-content: center; }
  .table-surface {
    background: linear-gradient(135deg, rgba(139,90,43,0.6), rgba(101,67,33,0.8));
    border-radius: 8px; height: 24px; margin: 2px 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px;
  }
  .seat {
    width: 72px; height: 58px;
    border-radius: 10px; border: 2px dashed rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    position: relative; transition: all 0.18s;
    cursor: default; user-select: none;
  }
  .seat.occupied { border: 2px solid transparent; cursor: grab; }
  .seat.drag-over { border-color: #FFD700; background: rgba(255,215,0,0.15); transform: scale(1.05); }
  .seat-name { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.5); text-align: center; word-break: break-all; line-height: 1.2; padding: 0 4px; }
  .seat-empty { font-size: 10px; color: rgba(255,255,255,0.25); }
  .seat-x {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.35); border: none;
    border-radius: 50%; width: 16px; height: 16px;
    color: #fff; cursor: pointer; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }

  /* QR section */
  .qr-section { text-align: center; margin-top: 20px; }
  .qr-box {
    display: inline-block; background: #fff;
    padding: 12px; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .qr-hint { margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4); }

  /* Stats bar */
  .stats { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }

  /* No tables */
  .no-tables {
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 18px; padding: 40px 20px;
    text-align: center; color: rgba(255,255,255,0.25); font-size: 14px;
  }
</style>
</head>
<body>

<div style="text-align:center;font-size:36px;margin-bottom:4px">🍻</div>
<h1>飲み会 席決めアプリ</h1>
<div class="subtitle" id="stats">参加者 0人 / 席 0席 / 着席済 0人</div>

<!-- Add Table -->
<div class="panel">
  <div class="panel-title gold">＋ テーブル追加</div>
  <div class="row">
    <div class="col">
      <label>行数（縦）</label>
      <input type="number" id="newRows" value="2" min="1" max="10">
    </div>
    <span style="color:rgba(255,255,255,0.4);margin-top:18px">×</span>
    <div class="col">
      <label>列数（横）</label>
      <input type="number" id="newCols" value="4" min="1" max="10">
    </div>
  </div>
  <button class="btn btn-gold" onclick="addTable()">テーブルを追加</button>
</div>

<!-- Add Person -->
<div class="panel">
  <div class="panel-title cyan">👤 参加者追加</div>
  <input type="text" id="nameInput" placeholder="名前を入力..." onkeydown="if(event.key==='Enter')addPerson()">
  <button class="btn btn-cyan" onclick="addPerson()">追加</button>
</div>

<!-- Shuffle -->
<button class="btn btn-pink" onclick="shuffle()" style="margin-bottom:14px">🎲 ランダム席決め</button>

<!-- People Pool -->
<div class="panel">
  <div class="panel-title gray" id="poolTitle">未着席 (0人)</div>
  <div class="pool" id="pool"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropToPool(event)">
    <span class="pool-empty">名前を追加するか、席からドラッグして戻してください</span>
  </div>
</div>

<!-- Tables -->
<div class="tables-area" id="tablesArea">
  <div class="no-tables" id="noTables">上からテーブルを追加してください</div>
</div>

<!-- QR Code section -->
<div class="qr-section" id="qrSection" style="display:none">
  <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:10px">📱 スマホで開くには</div>
  <div class="qr-box"><canvas id="qrCanvas"></canvas></div>
  <div class="qr-hint">このQRコードをスマホのカメラで読み取ってください</div>
</div>

<script>
// ===== State =====
let tables = [];
let people = [];
let dragging = null; // {source:'pool'|'seat', name, poolIdx?, tableIdx?, row?, col?}

const COLORS = [
  "#FF6B6B","#FF9F43","#FECA57","#1DD1A1","#48DBFB",
  "#54A0FF","#FF9FF3","#F368E0","#00D2D3","#EE5A24",
  "#009432","#0652DD","#9980FA","#5F27CD","#C8D6E5",
  "#FD7272","#B33771","#3B3B98","#6D214F","#182C61"
];
const nameColorMap = {};
let colorUsageCount = Array(COLORS.length).fill(0);

function getColor(name) {
  if (nameColorMap[name]) return nameColorMap[name];
  let minCount = Infinity, minIdx = 0;
  for (let i = 0; i < COLORS.length; i++) {
    if (colorUsageCount[i] < minCount) { minCount = colorUsageCount[i]; minIdx = i; }
  }
  colorUsageCount[minIdx]++;
  nameColorMap[name] = COLORS[minIdx];
  return COLORS[minIdx];
}

function releaseColor(name) {
  if (!nameColorMap[name]) return;
  const idx = COLORS.indexOf(nameColorMap[name]);
  if (idx >= 0) colorUsageCount[idx] = Math.max(0, colorUsageCount[idx] - 1);
  delete nameColorMap[name];
}

// ===== Actions =====
function addTable() {
  const rows = Math.max(1, Math.min(10, +document.getElementById('newRows').value));
  const cols = Math.max(1, Math.min(10, +document.getElementById('newCols').value));
  tables.push({ rows, cols, seats: Array.from({length:rows}, () => Array(cols).fill('')) });
  render();
}

function removeTable(i) {
  const freed = tables[i].seats.flat().filter(Boolean);
  people = [...people, ...freed];
  tables.splice(i, 1);
  render();
}

function addPerson() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) return;
  people.push(name);
  input.value = '';
  render();
}

function removePerson(i) {
  releaseColor(people[i]);
  people.splice(i, 1);
  render();
}

function removeSeat(ti, r, c) {
  const name = tables[ti].seats[r][c];
  if (name) { people.push(name); tables[ti].seats[r][c] = ''; }
  render();
}

function shuffle() {
  const all = [...people, ...tables.flatMap(t => t.seats.flat().filter(Boolean))];
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  let idx = 0;
  tables = tables.map(t => ({
    ...t,
    seats: t.seats.map(row => row.map(() => all[idx++] || ''))
  }));
  people = all.slice(idx);
  render();
}

// ===== Drag & Drop (Mouse) =====
function onDragStartPool(e, i) {
  dragging = { source: 'pool', name: people[i], poolIdx: i };
}
function onDragStartSeat(e, ti, r, c) {
  const name = tables[ti].seats[r][c];
  if (!name) return;
  dragging = { source: 'seat', name, tableIdx: ti, row: r, col: c };
}
function dropToSeat(e, ti, r, c) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragging) return;
  const target = tables[ti].seats[r][c];
  if (dragging.source === 'pool') {
    if (target) people.push(target);
    tables[ti].seats[r][c] = dragging.name;
    people.splice(dragging.poolIdx, 1);
  } else if (dragging.source === 'seat') {
    tables[ti].seats[r][c] = dragging.name;
    tables[dragging.tableIdx].seats[dragging.row][dragging.col] = target || '';
  }
  dragging = null;
  render();
}
function dropToPool(e) {
  e.preventDefault();
  document.getElementById('pool').classList.remove('drag-over');
  if (!dragging || dragging.source !== 'seat') return;
  people.push(dragging.name);
  tables[dragging.tableIdx].seats[dragging.row][dragging.col] = '';
  dragging = null;
  render();
}

// ===== Touch Drag (Mobile) =====
let touchDragging = null;
let touchClone = null;

function onTouchStart(e, source, data) {
  const touch = e.touches[0];
  touchDragging = { source, data };
  // Create visual clone
  const el = e.currentTarget;
  touchClone = el.cloneNode(true);
  const rect = el.getBoundingClientRect();
  touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;opacity:0.8;pointer-events:none;z-index:9999;transition:none;`;
  document.body.appendChild(touchClone);
  e.preventDefault();
}

document.addEventListener('touchmove', e => {
  if (!touchClone) return;
  const t = e.touches[0];
  touchClone.style.top = (t.clientY - 30) + 'px';
  touchClone.style.left = (t.clientX - 40) + 'px';
  e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!touchClone || !touchDragging) return;
  const t = e.changedTouches[0];
  touchClone.remove();
  touchClone = null;

  // Find element under finger
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (!el) { touchDragging = null; return; }

  const seatEl = el.closest('[data-seat]');
  const poolEl = el.closest('#pool');

  if (seatEl) {
    const ti = +seatEl.dataset.ti, r = +seatEl.dataset.r, c = +seatEl.dataset.c;
    const target = tables[ti].seats[r][c];
    if (touchDragging.source === 'pool') {
      const { name, idx } = touchDragging.data;
      if (target) people.push(target);
      tables[ti].seats[r][c] = name;
      people.splice(idx, 1);
    } else if (touchDragging.source === 'seat') {
      const { name, ti: sti, r: sr, c: sc } = touchDragging.data;
      tables[ti].seats[r][c] = name;
      tables[sti].seats[sr][sc] = target || '';
    }
    render();
  } else if (poolEl && touchDragging.source === 'seat') {
    const { name, ti, r, c } = touchDragging.data;
    people.push(name);
    tables[ti].seats[r][c] = '';
    render();
  }
  touchDragging = null;
}, { passive: false });

// ===== Render =====
function render() {
  renderPool();
  renderTables();
  updateStats();
}

function renderPool() {
  const pool = document.getElementById('pool');
  document.getElementById('poolTitle').textContent = `未着席 (${people.length}人)`;
  if (people.length === 0) {
    pool.innerHTML = '<span class="pool-empty">名前を追加するか、席からドラッグして戻してください</span>';
    return;
  }
  pool.innerHTML = '';
  people.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'chip';
    div.style.background = getColor(name) + 'cc';
    div.draggable = true;
    div.addEventListener('dragstart', () => onDragStartPool(null, i));
    div.addEventListener('touchstart', (e) => onTouchStart(e, 'pool', { name, idx: i }), { passive: false });

    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;

    const xBtn = document.createElement('span');
    xBtn.className = 'chip-x';
    xBtn.textContent = '✕';
    xBtn.addEventListener('click', () => removePerson(i));

    div.appendChild(nameSpan);
    div.appendChild(xBtn);
    pool.appendChild(div);
  });
}

function renderTables() {
  const area = document.getElementById('tablesArea');
  const noTables = document.getElementById('noTables');
  if (tables.length === 0) {
    area.innerHTML = '';
    area.appendChild(noTables);
    noTables.style.display = '';
    return;
  }
  area.innerHTML = '';
  tables.forEach((t, ti) => {
    const rows = t.rows, cols = t.cols;

    const card = document.createElement('div');
    card.className = 'table-card';

    // Header
    const header = document.createElement('div');
    header.className = 'table-header';
    header.innerHTML = `<span class="table-name">🍺 テーブル ${ti+1}</span><span class="table-size">${rows}×${cols}</span>`;
    const delBtn = document.createElement('button');
    delBtn.className = 'table-del';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => removeTable(ti));
    header.appendChild(delBtn);
    card.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'seats-grid';

    const makeRow = (r) => {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'seats-row';
      for (let c = 0; c < cols; c++) {
        const name = t.seats[r][c];
        const seatDiv = document.createElement('div');
        seatDiv.className = 'seat' + (name ? ' occupied' : '');
        seatDiv.dataset.seat = '';
        seatDiv.dataset.ti = ti;
        seatDiv.dataset.r = r;
        seatDiv.dataset.c = c;
        seatDiv.style.background = name ? getColor(name) + 'cc' : 'rgba(255,255,255,0.06)';
        seatDiv.style.border = name ? '2px solid transparent' : '2px dashed rgba(255,255,255,0.25)';

        seatDiv.addEventListener('dragover', (e) => { e.preventDefault(); seatDiv.classList.add('drag-over'); });
        seatDiv.addEventListener('dragleave', () => seatDiv.classList.remove('drag-over'));
        seatDiv.addEventListener('drop', (e) => dropToSeat(e, ti, r, c));

        if (name) {
          seatDiv.draggable = true;
          seatDiv.addEventListener('dragstart', () => onDragStartSeat(null, ti, r, c));
          seatDiv.addEventListener('touchstart', (e) => onTouchStart(e, 'seat', { name, ti, r, c }), { passive: false });

          const nameSpan = document.createElement('span');
          nameSpan.className = 'seat-name';
          nameSpan.textContent = name;

          const xBtn = document.createElement('button');
          xBtn.className = 'seat-x';
          xBtn.textContent = '✕';
          xBtn.addEventListener('click', () => removeSeat(ti, r, c));

          seatDiv.appendChild(nameSpan);
          seatDiv.appendChild(xBtn);
        } else {
          const empty = document.createElement('span');
          empty.className = 'seat-empty';
          empty.textContent = '空席';
          seatDiv.appendChild(empty);
        }
        rowDiv.appendChild(seatDiv);
      }
      return rowDiv;
    };

    grid.appendChild(makeRow(0));
    for (let r = 1; r < rows - 1; r++) grid.appendChild(makeRow(r));
    const surface = document.createElement('div');
    surface.className = 'table-surface';
    surface.textContent = 'TABLE';
    grid.appendChild(surface);
    if (rows >= 2) grid.appendChild(makeRow(rows - 1));

    card.appendChild(grid);
    area.appendChild(card);
  });
}

function updateStats() {
  const totalSeats = tables.reduce((a,t)=>a+t.rows*t.cols,0);
  const seated = tables.reduce((a,t)=>a+t.seats.flat().filter(Boolean).length,0);
  const total = seated + people.length;
  document.querySelector('.subtitle').textContent = `参加者 ${total}人 / 席 ${totalSeats}席 / 着席済 ${seated}人`;
}

// ===== QR Code (pure JS, no library) =====
// Simple URL-based QR via Google Charts API (no external JS dependency)
window.addEventListener('load', () => {
  // Only show QR if accessed via file:// - skip if local
  const url = location.href;
  if (url.startsWith('http')) {
    generateQR(url);
  }
});

function generateQR(url) {
  const section = document.getElementById('qrSection');
  const canvas = document.getElementById('qrCanvas');
  const img = new Image();
  const encoded = encodeURIComponent(url);
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    section.style.display = 'block';
  };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encoded}`;
}
</script>

<!-- How to use hint -->
<div style="margin-top:28px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;">
  <div style="font-size:13px;font-weight:800;color:rgba(255,255,255,0.5);margin-bottom:10px">📖 使い方</div>
  <div style="font-size:12px;color:rgba(255,255,255,0.4);line-height:1.9">
    1️⃣ テーブルの行数・列数を設定して追加<br>
    2️⃣ 参加者の名前を入力して追加<br>
    3️⃣ 名前を席にドラッグ&ドロップ<br>
    4️⃣ または「ランダム席決め」で自動配置<br>
    💡 席をタップ→✕で未着席に戻せます
  </div>
</div>

</body>
</html>
