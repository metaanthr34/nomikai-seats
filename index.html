<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="席決め">
<meta name="theme-color" content="#0f0c29">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>🍻 飲み会 席決めアプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
    font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
    color: #fff;
    padding: env(safe-area-inset-top, 16px) 12px calc(env(safe-area-inset-bottom, 0px) + 80px) 12px;
  }
  h1 {
    text-align: center; margin: 0 0 4px;
    font-size: 22px; font-weight: 900;
    background: linear-gradient(90deg, #FFD700, #FF6B6B, #FF9FF3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 20px; }
  .panel {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 16px; margin-bottom: 14px;
  }
  .panel-title { font-weight: 800; font-size: 13px; margin-bottom: 12px; }
  .panel-title.gold { color: #FFD700; }
  .panel-title.cyan { color: #48DBFB; }
  .panel-title.gray { color: rgba(255,255,255,0.5); }
  .row { display: flex; gap: 8px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  label { font-size: 11px; color: rgba(255,255,255,0.5); }
  input[type=number], input[type=text] {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 12px;
    color: #fff; font-size: 15px; outline: none;
    width: 100%; font-family: inherit;
  }
  input::placeholder { color: rgba(255,255,255,0.3); }
  .btn {
    width: 100%; padding: 12px 0;
    border: none; border-radius: 12px;
    color: #fff; font-weight: 800; font-size: 14px;
    cursor: pointer; font-family: inherit;
    margin-top: 10px;
  }
  .btn-gold { background: linear-gradient(135deg, #FFD700, #FF6B6B); }
  .btn-cyan { background: linear-gradient(135deg, #48DBFB, #54A0FF); }
  .btn-pink { background: linear-gradient(135deg, #FF9FF3, #FF6B6B); font-size: 16px; padding: 14px 0; }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .pool {
    min-height: 60px; display: flex; flex-wrap: wrap; gap: 8px;
    border: 2px dashed rgba(255,255,255,0.15); border-radius: 14px;
    padding: 12px; transition: all 0.2s;
  }
  .pool.drag-over { border-color: #FFD700; background: rgba(255,215,0,0.08); }
  .pool-empty { font-size: 12px; color: rgba(255,255,255,0.25); align-self: center; }
  .chip {
    border-radius: 20px; padding: 6px 12px;
    font-size: 13px; font-weight: 700;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    cursor: grab; user-select: none; touch-action: none;
  }
  .chip-x { cursor: pointer; opacity: 0.7; font-size: 11px; }
  .tables-area { display: flex; flex-direction: column; gap: 14px; }
  .table-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 16px;
    backdrop-filter: blur(8px);
  }
  .table-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .table-name { font-weight: 800; font-size: 14px; background: linear-gradient(135deg,#FFD700,#FF6B6B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .table-size { font-size: 11px; color: rgba(255,255,255,0.4); font-family: monospace; }
  .table-del {
    margin-left: auto; background: #FF6B6B; border: none;
    border-radius: 50%; width: 24px; height: 24px;
    color: #fff; cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .seats-grid { display: flex; flex-direction: column; gap: 6px; }
  .seats-row { display: flex; gap: 6px; justify-content: center; }
  .table-surface {
    background: linear-gradient(135deg, rgba(139,90,43,0.6), rgba(101,67,33,0.8));
    border-radius: 8px; height: 24px; margin: 2px 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px;
  }
  .seat {
    width: 72px; height: 58px;
    border-radius: 10px; border: 2px dashed rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    position: relative; transition: all 0.18s;
    cursor: default; user-select: none;
  }
  .seat.occupied { border: 2px solid transparent; cursor: grab; }
  .seat.drag-over { border-color: #FFD700; background: rgba(255,215,0,0.15); transform: scale(1.05); }
  .seat-name { font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.5); text-align: center; word-break: break-all; line-height: 1.2; padding: 0 4px; }
  .seat-empty { font-size: 10px; color: rgba(255,255,255,0.25); }
  .seat-x {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.35); border: none;
    border-radius: 50%; width: 16px; height: 16px;
    color: #fff; cursor: pointer; font-size: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .no-tables {
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 18px; padding: 40px 20px;
    text-align: center; color: rgba(255,255,255,0.25); font-size: 14px;
  }
  /* PWA install banner */
  #installBanner {
    display: none;
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,107,107,0.15));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 14px; padding: 12px 16px;
    margin-bottom: 14px;
    align-items: center; gap: 10px;
  }
  #installBanner.show { display: flex; }
  #installBanner span { flex: 1; font-size: 13px; color: rgba(255,255,255,0.8); }
  #installBtn {
    background: linear-gradient(135deg, #FFD700, #FF6B6B);
    border: none; border-radius: 10px; padding: 8px 14px;
    color: #fff; font-weight: 800; font-size: 12px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  #dismissBtn {
    background: none; border: none; color: rgba(255,255,255,0.4);
    cursor: pointer; font-size: 16px; padding: 0 4px;
  }
</style>
</head>
<body>

<!-- PWA Install Banner -->
<div id="installBanner">
  <span>📱 ホーム画面に追加してアプリとして使えます</span>
  <button id="installBtn">追加する</button>
  <button id="dismissBtn">✕</button>
</div>

<div style="text-align:center;font-size:36px;margin-bottom:4px">🍻</div>
<h1>飲み会 席決めアプリ</h1>
<div class="subtitle">参加者 0人 / 席 0席 / 着席済 0人</div>

<div class="panel">
  <div class="panel-title gold">＋ テーブル追加</div>
  <div class="row">
    <div class="col">
      <label>行数（縦）</label>
      <input type="number" id="newRows" value="2" min="1" max="10">
    </div>
    <span style="color:rgba(255,255,255,0.4);margin-top:18px">×</span>
    <div class="col">
      <label>列数（横）</label>
      <input type="number" id="newCols" value="4" min="1" max="10">
    </div>
  </div>
  <button class="btn btn-gold" onclick="addTable()">テーブルを追加</button>
</div>

<div class="panel">
  <div class="panel-title cyan">👤 参加者追加</div>
  <input type="text" id="nameInput" placeholder="名前を入力..." onkeydown="if(event.key==='Enter')addPerson()">
  <button class="btn btn-cyan" onclick="addPerson()">追加</button>
</div>

<button class="btn btn-pink" onclick="shuffle()" style="margin-bottom:8px">🎲 ランダム席決め</button>
<button onclick="clearAll()" style="width:100%;padding:10px 0;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:rgba(255,255,255,0.45);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;">🗑️ リセット</button>

<div class="panel">
  <div class="panel-title gray" id="poolTitle">未着席 (0人)</div>
  <div class="pool" id="pool"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="dropToPool(event)">
    <span class="pool-empty">名前を追加するか、席からドラッグして戻してください</span>
  </div>
</div>

<div class="tables-area" id="tablesArea">
  <div class="no-tables" id="noTables">上からテーブルを追加してください</div>
</div>

<div id="saveToast" style="position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 24px);left:50%;transform:translateX(-50%);background:rgba(29,209,161,0.92);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.3);">💾 自動保存しました</div>

<script>
// ===== State =====
let tables = [], people = [], dragging = null;

const COLORS = [
  "#FF6B6B","#FF9F43","#FECA57","#1DD1A1","#48DBFB",
  "#54A0FF","#FF9FF3","#F368E0","#00D2D3","#EE5A24",
  "#009432","#0652DD","#9980FA","#5F27CD","#C8D6E5",
  "#FD7272","#B33771","#3B3B98","#6D214F","#182C61"
];
const nameColorMap = {};
let colorUsageCount = Array(COLORS.length).fill(0);

function getColor(name) {
  if (nameColorMap[name]) return nameColorMap[name];
  let minCount = Infinity, minIdx = 0;
  for (let i = 0; i < COLORS.length; i++) {
    if (colorUsageCount[i] < minCount) { minCount = colorUsageCount[i]; minIdx = i; }
  }
  colorUsageCount[minIdx]++;
  nameColorMap[name] = COLORS[minIdx];
  return COLORS[minIdx];
}
function releaseColor(name) {
  if (!nameColorMap[name]) return;
  const idx = COLORS.indexOf(nameColorMap[name]);
  if (idx >= 0) colorUsageCount[idx] = Math.max(0, colorUsageCount[idx] - 1);
  delete nameColorMap[name];
}

// ===== Actions =====
function addTable() {
  const rows = Math.max(1, Math.min(10, +document.getElementById('newRows').value));
  const cols = Math.max(1, Math.min(10, +document.getElementById('newCols').value));
  tables.push({ rows, cols, seats: Array.from({length:rows}, () => Array(cols).fill('')) });
  render();
}
function removeTable(i) {
  people = [...people, ...tables[i].seats.flat().filter(Boolean)];
  tables.splice(i, 1);
  render();
}
function addPerson() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) return;
  people.push(name);
  input.value = '';
  render();
}
function removePerson(i) {
  releaseColor(people[i]);
  people.splice(i, 1);
  render();
}
function removeSeat(ti, r, c) {
  const name = tables[ti].seats[r][c];
  if (name) { people.push(name); tables[ti].seats[r][c] = ''; }
  render();
}
function shuffle() {
  const all = [...people, ...tables.flatMap(t => t.seats.flat().filter(Boolean))];
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  let idx = 0;
  tables = tables.map(t => ({ ...t, seats: t.seats.map(row => row.map(() => all[idx++] || '')) }));
  people = all.slice(idx);
  render();
}
function clearAll() {
  if (!confirm('全データをリセットしますか？')) return;
  tables = []; people = [];
  Object.keys(nameColorMap).forEach(k => delete nameColorMap[k]);
  colorUsageCount = Array(COLORS.length).fill(0);
  ['nomikai_tables','nomikai_people','nomikai_colorMap','nomikai_colorCount'].forEach(k => localStorage.removeItem(k));
  render();
}

// ===== Drag & Drop =====
function onDragStartPool(i) { dragging = { source:'pool', name:people[i], poolIdx:i }; }
function onDragStartSeat(ti, r, c) {
  const name = tables[ti].seats[r][c];
  if (name) dragging = { source:'seat', name, tableIdx:ti, row:r, col:c };
}
function dropToSeat(e, ti, r, c) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragging) return;
  const target = tables[ti].seats[r][c];
  if (dragging.source === 'pool') {
    if (target) people.push(target);
    tables[ti].seats[r][c] = dragging.name;
    people.splice(dragging.poolIdx, 1);
  } else {
    tables[ti].seats[r][c] = dragging.name;
    tables[dragging.tableIdx].seats[dragging.row][dragging.col] = target || '';
  }
  dragging = null; render();
}
function dropToPool(e) {
  e.preventDefault();
  document.getElementById('pool').classList.remove('drag-over');
  if (!dragging || dragging.source !== 'seat') return;
  people.push(dragging.name);
  tables[dragging.tableIdx].seats[dragging.row][dragging.col] = '';
  dragging = null; render();
}

// ===== Touch =====
let touchDragging = null, touchClone = null;
function onTouchStart(e, source, data) {
  touchDragging = { source, data };
  const el = e.currentTarget;
  touchClone = el.cloneNode(true);
  const rect = el.getBoundingClientRect();
  touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;opacity:0.8;pointer-events:none;z-index:9999;transition:none;`;
  document.body.appendChild(touchClone);
  e.preventDefault();
}
document.addEventListener('touchmove', e => {
  if (!touchClone) return;
  const t = e.touches[0];
  touchClone.style.top = (t.clientY - 30) + 'px';
  touchClone.style.left = (t.clientX - 40) + 'px';
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchend', e => {
  if (!touchClone || !touchDragging) return;
  const t = e.changedTouches[0];
  touchClone.remove(); touchClone = null;
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if (!el) { touchDragging = null; return; }
  const seatEl = el.closest('[data-seat]');
  const poolEl = el.closest('#pool');
  if (seatEl) {
    const ti = +seatEl.dataset.ti, r = +seatEl.dataset.r, c = +seatEl.dataset.c;
    const target = tables[ti].seats[r][c];
    if (touchDragging.source === 'pool') {
      const { name, idx } = touchDragging.data;
      if (target) people.push(target);
      tables[ti].seats[r][c] = name;
      people.splice(idx, 1);
    } else {
      const { name, ti:sti, r:sr, c:sc } = touchDragging.data;
      tables[ti].seats[r][c] = name;
      tables[sti].seats[sr][sc] = target || '';
    }
    render();
  } else if (poolEl && touchDragging.source === 'seat') {
    const { name, ti, r, c } = touchDragging.data;
    people.push(name);
    tables[ti].seats[r][c] = '';
    render();
  }
  touchDragging = null;
}, { passive: false });

// ===== Storage =====
function saveData() {
  try {
    localStorage.setItem('nomikai_tables', JSON.stringify(tables));
    localStorage.setItem('nomikai_people', JSON.stringify(people));
    localStorage.setItem('nomikai_colorMap', JSON.stringify(nameColorMap));
    localStorage.setItem('nomikai_colorCount', JSON.stringify(colorUsageCount));
  } catch(e) {}
}
function loadData() {
  try {
    const t = localStorage.getItem('nomikai_tables');
    const p = localStorage.getItem('nomikai_people');
    const cm = localStorage.getItem('nomikai_colorMap');
    const cc = localStorage.getItem('nomikai_colorCount');
    if (t) tables = JSON.parse(t);
    if (p) people = JSON.parse(p);
    if (cm) Object.assign(nameColorMap, JSON.parse(cm));
    if (cc) colorUsageCount = JSON.parse(cc);
  } catch(e) {}
}

// ===== Render =====
let toastTimer = null;
function render() {
  renderPool(); renderTables(); updateStats(); saveData();
  const toast = document.getElementById('saveToast');
  toast.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
}
function renderPool() {
  const pool = document.getElementById('pool');
  document.getElementById('poolTitle').textContent = `未着席 (${people.length}人)`;
  pool.innerHTML = '';
  if (people.length === 0) {
    pool.innerHTML = '<span class="pool-empty">名前を追加するか、席からドラッグして戻してください</span>';
    return;
  }
  people.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'chip';
    div.style.background = getColor(name) + 'cc';
    div.draggable = true;
    div.addEventListener('dragstart', () => onDragStartPool(i));
    div.addEventListener('touchstart', e => onTouchStart(e, 'pool', { name, idx:i }), { passive:false });
    const ns = document.createElement('span'); ns.textContent = name;
    const xb = document.createElement('span'); xb.className = 'chip-x'; xb.textContent = '✕';
    xb.addEventListener('click', () => removePerson(i));
    div.appendChild(ns); div.appendChild(xb); pool.appendChild(div);
  });
}
function renderTables() {
  const area = document.getElementById('tablesArea');
  const noT = document.getElementById('noTables');
  if (tables.length === 0) { area.innerHTML = ''; area.appendChild(noT); noT.style.display = ''; return; }
  area.innerHTML = '';
  tables.forEach((t, ti) => {
    const { rows, cols } = t;
    const card = document.createElement('div'); card.className = 'table-card';
    const hdr = document.createElement('div'); hdr.className = 'table-header';
    hdr.innerHTML = `<span class="table-name">🍺 テーブル ${ti+1}</span><span class="table-size">${rows}×${cols}</span>`;
    const db = document.createElement('button'); db.className = 'table-del'; db.textContent = '✕';
    db.addEventListener('click', () => removeTable(ti));
    hdr.appendChild(db); card.appendChild(hdr);
    const grid = document.createElement('div'); grid.className = 'seats-grid';
    const makeRow = r => {
      const row = document.createElement('div'); row.className = 'seats-row';
      for (let c = 0; c < cols; c++) {
        const name = t.seats[r][c];
        const sd = document.createElement('div');
        sd.className = 'seat' + (name ? ' occupied' : '');
        sd.dataset.seat = ''; sd.dataset.ti = ti; sd.dataset.r = r; sd.dataset.c = c;
        sd.style.background = name ? getColor(name)+'cc' : 'rgba(255,255,255,0.06)';
        sd.style.border = name ? '2px solid transparent' : '2px dashed rgba(255,255,255,0.25)';
        sd.addEventListener('dragover', e => { e.preventDefault(); sd.classList.add('drag-over'); });
        sd.addEventListener('dragleave', () => sd.classList.remove('drag-over'));
        sd.addEventListener('drop', e => dropToSeat(e, ti, r, c));
        if (name) {
          sd.draggable = true;
          sd.addEventListener('dragstart', () => onDragStartSeat(ti, r, c));
          sd.addEventListener('touchstart', e => onTouchStart(e, 'seat', { name, ti, r, c }), { passive:false });
          const ns = document.createElement('span'); ns.className = 'seat-name'; ns.textContent = name;
          const xb = document.createElement('button'); xb.className = 'seat-x'; xb.textContent = '✕';
          xb.addEventListener('click', () => removeSeat(ti, r, c));
          sd.appendChild(ns); sd.appendChild(xb);
        } else {
          const em = document.createElement('span'); em.className = 'seat-empty'; em.textContent = '空席';
          sd.appendChild(em);
        }
        row.appendChild(sd);
      }
      return row;
    };
    grid.appendChild(makeRow(0));
    for (let r = 1; r < rows-1; r++) grid.appendChild(makeRow(r));
    const surf = document.createElement('div'); surf.className = 'table-surface'; surf.textContent = 'TABLE';
    grid.appendChild(surf);
    if (rows >= 2) grid.appendChild(makeRow(rows-1));
    card.appendChild(grid); area.appendChild(card);
  });
}
function updateStats() {
  const totalSeats = tables.reduce((a,t) => a+t.rows*t.cols, 0);
  const seated = tables.reduce((a,t) => a+t.seats.flat().filter(Boolean).length, 0);
  document.querySelector('.subtitle').textContent = `参加者 ${seated+people.length}人 / 席 ${totalSeats}席 / 着席済 ${seated}人`;
}

// ===== PWA Install =====
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('dismissBtn').addEventListener('click', () => {
  document.getElementById('installBanner').classList.remove('show');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
});

// ===== Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ===== Init =====
window.addEventListener('load', () => {
  loadData();
  render();
});
</script>
</body>
</html>
